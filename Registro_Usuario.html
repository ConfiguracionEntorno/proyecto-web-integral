<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Usuario</title>

    <style>
      /* 1. Variables de CSS y Reset Básico */
      :root {
        --primary-color: #007bff;
        --primary-hover: #0056b3;
        --secondary-bg: #f8f9fa;
        --secondary-hover: #e2e6ea;
        --text-color: #333;
        --border-color: #ccc;
        --focus-color: rgba(0, 123, 255, 0.25);
      }

      * {
        box-sizing: border-box; /* Crucial: asegura que el padding no rompa el ancho del 100% */
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          Arial,
          sans-serif; /* Tipografía más moderna */
        background: #f4f7f6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh; /* min-height en lugar de height para evitar recortes en pantallas pequeñas */
        color: var(--text-color);
      }

      .registro-card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 350px; /* Mejor manejo de anchos en móviles */
        box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.08); /* Sombra más suave y moderna */
      }

      .registro-card h2 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 600;
      }

      /* 2. Agrupación de inputs para mejor espaciado */
      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 5px;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 1rem;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }

      /* 3. Estado de enfoque (Focus) para accesibilidad */
      input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px var(--focus-color);
      }

      /* 4. Estilos de botones diferenciados */
      .button-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 20px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .btn-primary {
        background: var(--primary-color);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-hover);
      }

      .btn-secondary {
        background: var(--secondary-bg);
        color: var(--text-color);
        border: 1px solid var(--border-color);
      }

      .btn-secondary:hover {
        background: var(--secondary-hover);
      }
    </style>
  </head>

  <body>
    <div class="registro-card">
      <h2>Registro</h2>

      <form action="#" method="POST">
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <value
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Ej. Juan Pérez"
            required
          />
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Ej. Juan Pérez"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="ejemplo@correo.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="••••••••"
            required
          />
        </div>

        <div class="button-group">
          <button type="submit" class="btn-primary">Registrarse</button>
          <button type="button" class="btn-secondary">Salir</button>
        </div>
      </form>
    </div>
  </body>
</html>
